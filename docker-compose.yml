version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: aec-rag-ollama
    volumes:
      - ollama_storage:/root/.ollama
    ports:
      - "11434:11434"

  web-app:
    build: .
    container_name: aec-rag-web
    ports:
      - "5000:5000"
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - DATA_FILE_PATH=/data/project_data.xlsx
    volumes:
      - ./project_data:/data
    depends_on:
      - ollama
    # This force-waits a few seconds to let the main Ollama service initialize its socket before Python runs
    command: sh -c "sleep 8 && python aec_rag_web_excel.py"
    # command: >
    #   sh -c "
    #       until curl -s http://ollama:11434/api/tags > /dev/null;
    #       do
    #         echo 'Waiting for Ollama...';
    #         sleep 2;
    #       done;
    #       python aec_rag_web_excel.py
    #       "
    

volumes:
  ollama_storage: