version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: aec-rag-ollama
    volumes:
      - ollama_storage:/root/.ollama
    ports:
      - "11434:11434"
    # Auto-pull the models right after the Ollama service starts up
    entrypoint: /bin/sh -c "ollama serve & sleep 5 && ollama pull llama3.2:latest && ollama pull nomic-embed-text && tail -f /dev/null"

  web-app:
    build: .
    container_name: aec-rag-web
    ports:
      - "5000:5000"
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - DATA_FILE_PATH=/data/project_data.xlsx
    volumes:
      # Mounts a local folder named "./project_data" to /data inside the container
      - ./project_data:/data
    depends_on:
      - ollama

volumes:
  ollama_storage: